name: Build Windows

on:
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Enable Windows desktop support
        run: flutter config --enable-windows-desktop

      - name: Regenerate Windows platform files
        run: flutter create . --platforms=windows

      - name: Install dependencies
        run: flutter pub get

      - name: Build Windows release
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: CosmosCalc-Windows-${{ github.sha }}
          path: build/windows/x64/runner/Release/
          retention-days: 30

      - name: Create release zip
        run: |
          Compress-Archive -Path build/windows/x64/runner/Release/* -DestinationPath CosmosCalc-Windows.zip
        shell: pwsh

      - name: Upload zip artifact
        uses: actions/upload-artifact@v4
        with:
          name: CosmosCalc-Windows-zip
          path: CosmosCalc-Windows.zip
          retention-days: 30
